services:
  - type: web
    name: khpr-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn khpr_backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: khpr-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"

databases:
  - name: khpr-db
    databaseName: khpr
    user: khpr
